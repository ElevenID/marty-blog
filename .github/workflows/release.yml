name: Release npm package

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Validate tag version
        run: test "$(node -p "require('./package.json').version")" = "${GITHUB_REF_NAME#v}"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Build release evidence
        run: |
          mkdir -p release
          npm sbom --sbom-format cyclonedx > release/marty-blog-sbom.cdx.json
          npm pack --pack-destination release
          cd release && sha256sum ./*.tgz > SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: marty-blog-release
          path: release
          retention-days: 7

  publish-npm:
    if: vars.ENABLE_PUBLIC_REGISTRY_PUBLISHING == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: marty-blog-release
          path: release
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm publish release/*.tgz --access public --provenance

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: marty-blog-release
          path: release
      - uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: release/*.tgz
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            release/*.tgz
            release/*sbom*.json
            release/SHA256SUMS
          generate_release_notes: true
