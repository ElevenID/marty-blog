name: Node Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: node-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-quality:
    uses: ElevenID/.github/.github/workflows/quality-node.yml@9b6141e294da5c0f9254cfaa60c8934df95ec68b
    with:
      node-version: "24"
      type-command: ""
      test-command: npm run test:coverage
